<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Aicha Mbongo — Systems Research, ML, Engineering, NLP, Automation</title>
<desc>Abstract animated network representing systems research, ML, engineering, NLP, and automation</desc>
<defs>
<style>
@keyframes nodePulse{0%,100%{opacity:.3;r:5}50%{opacity:1;r:7}}
@keyframes nodePulse2{0%,100%{opacity:.3;r:5}50%{opacity:1;r:7}}
@keyframes nodePulse3{0%,100%{opacity:.3;r:5}50%{opacity:1;r:7}}
@keyframes flow{to{stroke-dashoffset:-20}}
@keyframes ecgCycle{0%,100%{stroke-dashoffset:900;opacity:0}5%{opacity:1}70%{stroke-dashoffset:0;opacity:1}85%,99%{opacity:0}}
@keyframes glow{0%,100%{opacity:.15}50%{opacity:.4}}
@keyframes tagFade{0%,100%{opacity:.4}50%{opacity:.9}}
.np1{animation:nodePulse 2.4s ease-in-out infinite}
.np2{animation:nodePulse2 2.4s ease-in-out .5s infinite}
.np3{animation:nodePulse3 2.4s ease-in-out 1s infinite}
.np4{animation:nodePulse 2.4s ease-in-out 1.5s infinite}
.np5{animation:nodePulse2 2.4s ease-in-out .3s infinite}
.np6{animation:nodePulse3 2.4s ease-in-out .9s infinite}
.np7{animation:nodePulse 2.4s ease-in-out 1.2s infinite}
.np8{animation:nodePulse2 2.4s ease-in-out .7s infinite}
.np9{animation:nodePulse3 2.4s ease-in-out 1.8s infinite}
.df{stroke-dasharray:5 5;animation:flow 2s linear infinite}
.df2{stroke-dasharray:5 5;animation:flow 2.5s linear infinite}
.df3{stroke-dasharray:5 5;animation:flow 3s linear infinite}
.ecg{animation:ecgCycle 4s ease-in-out infinite}
.ecg2{animation:ecgCycle 4s ease-in-out 2s infinite}
.bg1{animation:glow 3s ease-in-out infinite}
.bg2{animation:glow 3s ease-in-out 1s infinite}
.bg3{animation:glow 3s ease-in-out 2s infinite}
.t1{animation:tagFade 3s ease-in-out infinite}
.t2{animation:tagFade 3s ease-in-out .75s infinite}
.t3{animation:tagFade 3s ease-in-out 1.5s infinite}
.t4{animation:tagFade 3s ease-in-out 2.25s infinite}
</style>
